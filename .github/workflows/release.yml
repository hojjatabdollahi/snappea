name: Release

on:
  push:
    tags:
      - "v*"

  # Cloudsmith config is supplied via GitHub Secrets:
  #   CLOUDSMITH_API_KEY — your Cloudsmith API key

jobs:
  build-and-publish:
    name: Build .deb and publish to Cloudsmith
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Rust toolchain ─────────────────────────────────────────────────────
      # snappea uses Rust 2024 edition which requires rustc >= 1.85
      - name: Install Rust stable (>= 1.85)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry + build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # ── System build dependencies ──────────────────────────────────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            libgstreamer-plugins-bad1.0-dev \
            gstreamer1.0-plugins-base \
            libtesseract-dev \
            libleptonica-dev \
            libwayland-dev \
            libgbm-dev \
            libdrm-dev \
            libglib2.0-dev \
            libgtk-3-dev \
            libdbus-1-dev

      # ── cargo-deb ──────────────────────────────────────────────────────────
      - name: Install cargo-deb
        run: cargo install cargo-deb --locked

      # ── Build ──────────────────────────────────────────────────────────────
      - name: Build release binary
        run: cargo build --release --locked

      - name: Build .deb package
        run: cargo deb --no-build
        # --no-build because we already built above; cargo-deb just packages

      - name: Locate .deb file
        id: deb
        run: |
          DEB=$(ls target/debian/*.deb | head -1)
          echo "path=$DEB" >> "$GITHUB_OUTPUT"
          echo "name=$(basename $DEB)" >> "$GITHUB_OUTPUT"

      # ── Upload to GitHub Releases (optional but useful) ────────────────────
      - name: Upload .deb to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.deb.outputs.path }}

      # ── Publish to Cloudsmith ──────────────────────────────────────────────
      - name: Install Cloudsmith CLI
        run: pip install --upgrade cloudsmith-cli

      - name: Push .deb to Cloudsmith
        env:
          CLOUDSMITH_API_KEY: ${{ secrets.CLOUDSMITH_API_KEY }}
        run: |
          cloudsmith push deb \
            "cosmetics/snappea/pop/noble" \
            "${{ steps.deb.outputs.path }}"
